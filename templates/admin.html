<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Connact.ai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-badge {
            background: #f59e0b;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #b91c1c;
        }

        .tabs {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            color: #6b7280;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #f3f4f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #1f2937;
            font-size: 22px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e5e7eb;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: #1f2937;
        }

        tr:hover {
            background: #f9fafb;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #1f2937;
            font-size: 20px;
        }

        .close-btn {
            background: #e5e7eb;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #d1d5db;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #10b981;
        }

        .error-detail {
            background: #f9fafb;
            padding: 16px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .error-detail pre {
            overflow-x: auto;
            font-size: 12px;
            color: #374151;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .activity-list {
            margin-top: 12px;
        }

        .activity-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .date-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .date-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .date-text {
            font-size: 16px;
            font-weight: 600;
        }

        .date-count {
            font-size: 14px;
            opacity: 0.9;
        }

        .activity-meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .activity-event {
            border-top: 1px dashed #e5e7eb;
            margin-top: 8px;
            padding-top: 8px;
        }

        .activity-event pre {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            color: #374151;
            font-weight: 500;
        }

        .filter-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }

            .tabs {
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔧 Connact.ai 管理面板</h1>
            <div class="header-info">
                <span class="admin-badge">ADMIN</span>
                <span id="admin-email">{{ user_email }}</span>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">📊 概览</button>
            <button class="tab-btn" onclick="switchTab('users')">👥 用户管理</button>
            <button class="tab-btn" onclick="switchTab('errors')">🐛 错误日志</button>
        </div>

        <!-- Overview Tab -->
        <div id="overview-tab" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总用户数</div>
                    <div class="stat-value" id="total-users">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日活跃用户</div>
                    <div class="stat-value" id="active-users-today">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">未解决错误</div>
                    <div class="stat-value" id="unresolved-errors">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总 Credits 消耗</div>
                    <div class="stat-value" id="total-credits-used">-</div>
                </div>
            </div>

            <div class="card">
                <h2>快速操作</h2>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="switchTab('users')">查看用户列表</button>
                    <button class="btn btn-danger" onclick="switchTab('errors')">查看错误日志</button>
                    <button class="btn btn-success" onclick="loadAllData()">刷新数据</button>
                </div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="users-tab" class="tab-content">
            <div class="card">
                <h2>用户列表</h2>
                <div id="users-loading" class="loading">加载中...</div>
                <div id="users-error" class="error-message" style="display: none;"></div>
                <div id="users-table-container" class="table-container" style="display: none;">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>邮箱</th>
                                <th>显示名称</th>
                                <th>剩余 Credits</th>
                                <th>已使用</th>
                                <th>创建时间</th>
                                <th>最后登录</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Errors Tab -->
        <div id="errors-tab" class="tab-content">
            <div class="card">
                <h2>错误日志</h2>
                <div class="filters">
                    <div class="filter-group">
                        <input type="checkbox" id="show-resolved" onchange="loadErrors()">
                        <label for="show-resolved">显示已解决的错误</label>
                    </div>
                    <button class="btn btn-sm btn-primary" onclick="loadErrors()">刷新</button>
                </div>
                <div id="errors-loading" class="loading">加载中...</div>
                <div id="errors-error" class="error-message" style="display: none;"></div>
                <div id="errors-table-container" class="table-container" style="display: none;">
                    <table id="errors-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>错误类型</th>
                                <th>错误信息</th>
                                <th>请求路径</th>
                                <th>用户ID</th>
                                <th>时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="errors-tbody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Credits Modal -->
    <div id="add-credits-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加 Credits</h3>
                <button class="close-btn" onclick="closeModal('add-credits-modal')">&times;</button>
            </div>
            <div id="add-credits-message"></div>
            <form id="add-credits-form" onsubmit="submitAddCredits(event)">
                <div class="form-group">
                    <label>用户邮箱</label>
                    <input type="text" id="add-credits-email" readonly>
                </div>
                <div class="form-group">
                    <label>当前 Credits</label>
                    <input type="text" id="add-credits-current" readonly>
                </div>
                <div class="form-group">
                    <label>添加数量 *</label>
                    <input type="number" id="add-credits-amount" required min="1" placeholder="例如: 10">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="closeModal('add-credits-modal')">取消</button>
                    <button type="submit" class="btn btn-success">确认添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- User Info Modal -->
    <div id="user-info-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>用户详细信息</h3>
                <button class="close-btn" onclick="closeModal('user-info-modal')">&times;</button>
            </div>
            <div id="user-info-loading" class="loading">加载中...</div>
            <div id="user-info-content" style="display: none;">
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="text" id="info-user-id" readonly>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="text" id="info-email" readonly>
                </div>
                <div class="form-group">
                    <label>显示名称</label>
                    <input type="text" id="info-display-name" readonly>
                </div>
                <div class="form-group">
                    <label>验证状态</label>
                    <input type="text" id="info-verified" readonly>
                </div>
                <div class="form-group">
                    <label>创建时间</label>
                    <input type="text" id="info-created-at" readonly>
                </div>
                <div class="form-group">
                    <label>最后登录</label>
                    <input type="text" id="info-last-login" readonly>
                </div>
                <div class="form-group">
                    <label>剩余 Credits</label>
                    <input type="text" id="info-credits" readonly>
                </div>
                <div class="form-group">
                    <label>已使用 Credits</label>
                    <input type="text" id="info-credits-used" readonly>
                </div>
                <div class="form-group">
                    <label>保存的联系人</label>
                    <input type="text" id="info-contacts-count" readonly>
                </div>
                <div class="form-group">
                    <label>生成的邮件</label>
                    <input type="text" id="info-emails-count" readonly>
                </div>
                <div class="form-group">
                    <label>活动记录</label>
                    <div id="info-activities" class="activity-list"></div>
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="exportUserData()" style="width: 100%;">
                        <span>📥</span> 导出完整数据 (JSON)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Detail Modal -->
    <div id="error-detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>错误详情</h3>
                <button class="close-btn" onclick="closeModal('error-detail-modal')">&times;</button>
            </div>
            <div id="error-detail-content"></div>
            <div id="resolve-error-form" style="margin-top: 20px;">
                <div class="form-group">
                    <label>解决备注（可选）</label>
                    <textarea id="resolve-notes" placeholder="记录解决方案或相关说明..."></textarea>
                </div>
                <button class="btn btn-success" onclick="resolveError()">✓ 标记为已解决</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let currentErrorId = null;
        let usersData = [];
        let errorsData = [];

        // Tab switching
        function switchTab(tabName) {
            // Update tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // Load data if needed
            if (tabName === 'overview' && usersData.length === 0) {
                loadAllData();
            } else if (tabName === 'users' && usersData.length === 0) {
                loadUsers();
            } else if (tabName === 'errors' && errorsData.length === 0) {
                loadErrors();
            }
        }

        // Load all data for overview
        async function loadAllData() {
            try {
                await Promise.all([loadUsers(), loadErrors()]);
                updateOverviewStats();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Update overview statistics
        function updateOverviewStats() {
            document.getElementById('total-users').textContent = usersData.length;
            
            // Count active users today
            const today = new Date().toISOString().split('T')[0];
            const activeToday = usersData.filter(u => 
                u.last_login_at && u.last_login_at.startsWith(today)
            ).length;
            document.getElementById('active-users-today').textContent = activeToday;
            
            // Count unresolved errors
            const unresolved = errorsData.filter(e => !e.resolved_at).length;
            document.getElementById('unresolved-errors').textContent = unresolved;
            
            // Total credits used
            const totalUsed = usersData.reduce((sum, u) => sum + (u.credits.total_used || 0), 0);
            document.getElementById('total-credits-used').textContent = totalUsed;
        }

        // Load users
        async function loadUsers() {
            const loading = document.getElementById('users-loading');
            const error = document.getElementById('users-error');
            const container = document.getElementById('users-table-container');
            const tbody = document.getElementById('users-tbody');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            container.style.display = 'none';
            
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load users');
                }
                
                usersData = data.users;
                tbody.innerHTML = '';
                
                data.users.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${escapeHtml(user.email)}</td>
                        <td>${escapeHtml(user.display_name || '-')}</td>
                        <td><span class="badge badge-success">${user.credits.apollo_credits}</span></td>
                        <td><span class="badge badge-warning">${user.credits.total_used}</span></td>
                        <td>${formatDate(user.created_at)}</td>
                        <td>${formatDate(user.last_login_at)}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="showUserInfo('${user.user_id}')">详情</button>
                            <button class="btn btn-sm btn-success" onclick="openAddCreditsModal('${user.user_id}', '${escapeHtml(user.email)}', ${user.credits.apollo_credits})">+ Credits</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                loading.style.display = 'none';
                container.style.display = 'block';
                
                updateOverviewStats();
            } catch (err) {
                loading.style.display = 'none';
                error.textContent = err.message;
                error.style.display = 'block';
            }
        }

        // Load errors
        async function loadErrors() {
            const loading = document.getElementById('errors-loading');
            const errorDiv = document.getElementById('errors-error');
            const container = document.getElementById('errors-table-container');
            const tbody = document.getElementById('errors-tbody');
            const showResolved = document.getElementById('show-resolved').checked;
            
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            container.style.display = 'none';
            
            try {
                const url = `/api/admin/errors?show_resolved=${showResolved}&limit=100`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load errors');
                }
                
                errorsData = data.errors;
                tbody.innerHTML = '';
                
                if (data.errors.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #6b7280;">没有错误日志</td></tr>';
                } else {
                    data.errors.forEach(error => {
                        const row = document.createElement('tr');
                        const isResolved = !!error.resolved_at;
                        row.innerHTML = `
                            <td>${error.id}</td>
                            <td><span class="badge badge-error">${escapeHtml(error.error_type)}</span></td>
                            <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(error.error_message)}</td>
                            <td><code>${escapeHtml(error.request_path || '-')}</code></td>
                            <td>${escapeHtml(error.user_id || '-')}</td>
                            <td>${formatDate(error.created_at)}</td>
                            <td>${isResolved ? '<span class="badge badge-success">已解决</span>' : '<span class="badge badge-error">未解决</span>'}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="showErrorDetail(${error.id})">查看</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }
                
                loading.style.display = 'none';
                container.style.display = 'block';
                
                updateOverviewStats();
            } catch (err) {
                loading.style.display = 'none';
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        }

        // Show user info
        async function showUserInfo(userId) {
            currentUserId = userId;  // Store for export function
            const modal = document.getElementById('user-info-modal');
            const loading = document.getElementById('user-info-loading');
            const content = document.getElementById('user-info-content');
            
            modal.classList.add('active');
            loading.style.display = 'block';
            content.style.display = 'none';
            
            try {
                const response = await fetch(`/api/admin/user/${userId}/info`);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load user info');
                }
                
                document.getElementById('info-user-id').value = data.user.user_id;
                document.getElementById('info-email').value = data.user.email;
                document.getElementById('info-display-name').value = data.user.display_name || '-';
                document.getElementById('info-verified').value = data.user.is_verified ? '✓ 已验证' : '✗ 未验证';
                document.getElementById('info-created-at').value = formatDate(data.user.created_at);
                document.getElementById('info-last-login').value = formatDate(data.user.last_login_at);
                document.getElementById('info-credits').value = data.credits?.apollo_credits || 5;
                document.getElementById('info-credits-used').value = data.credits?.total_used || 0;
                document.getElementById('info-contacts-count').value = data.usage?.saved_contacts || 0;
                document.getElementById('info-emails-count').value = data.usage?.generated_emails || 0;
                renderActivityDates(data.activity_dates || []);
                
                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (err) {
                alert('加载用户信息失败: ' + err.message);
                closeModal('user-info-modal');
            }
        }

        // Open add credits modal
        function openAddCreditsModal(userId, email, currentCredits) {
            currentUserId = userId;
            document.getElementById('add-credits-email').value = email;
            document.getElementById('add-credits-current').value = currentCredits;
            document.getElementById('add-credits-amount').value = '';
            document.getElementById('add-credits-message').innerHTML = '';
            document.getElementById('add-credits-modal').classList.add('active');
        }

        // Submit add credits
        async function submitAddCredits(event) {
            event.preventDefault();
            
            const amount = parseInt(document.getElementById('add-credits-amount').value);
            const messageDiv = document.getElementById('add-credits-message');
            
            try {
                const response = await fetch(`/api/admin/user/${currentUserId}/add-credits`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({amount})
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to add credits');
                }
                
                messageDiv.innerHTML = `<div class="success-message">✓ 成功添加 ${amount} credits！新余额: ${data.new_total}</div>`;
                
                setTimeout(() => {
                    closeModal('add-credits-modal');
                    loadUsers();
                }, 1500);
            } catch (err) {
                messageDiv.innerHTML = `<div class="error-message">✗ ${err.message}</div>`;
            }
        }

        // Show error detail
        async function showErrorDetail(errorId) {
            currentErrorId = errorId;
            const modal = document.getElementById('error-detail-modal');
            const content = document.getElementById('error-detail-content');
            
            // Find error in current data
            const error = errorsData.find(e => e.id === errorId);
            if (!error) return;
            
            let html = `
                <div class="error-detail">
                    <p><strong>错误ID:</strong> ${error.id}</p>
                    <p><strong>错误类型:</strong> <code>${escapeHtml(error.error_type)}</code></p>
                    <p><strong>错误信息:</strong></p>
                    <pre>${escapeHtml(error.error_message)}</pre>
                    <p><strong>请求路径:</strong> <code>${escapeHtml(error.request_path || '-')}</code></p>
                    <p><strong>用户ID:</strong> ${escapeHtml(error.user_id || '-')}</p>
                    <p><strong>发生时间:</strong> ${formatDate(error.created_at)}</p>
            `;
            
            if (error.context) {
                html += `
                    <p><strong>上下文:</strong></p>
                    <pre>${escapeHtml(JSON.stringify(error.context, null, 2))}</pre>
                `;
            }
            
            if (error.resolved_at) {
                html += `
                    <p><strong>已解决:</strong> ${formatDate(error.resolved_at)}</p>
                    <p><strong>解决人:</strong> ${escapeHtml(error.resolved_by)}</p>
                    ${error.notes ? `<p><strong>备注:</strong> ${escapeHtml(error.notes)}</p>` : ''}
                `;
                document.getElementById('resolve-error-form').style.display = 'none';
            } else {
                document.getElementById('resolve-error-form').style.display = 'block';
                document.getElementById('resolve-notes').value = '';
            }
            
            html += '</div>';
            content.innerHTML = html;
            modal.classList.add('active');
        }

        // Resolve error
        async function resolveError() {
            const notes = document.getElementById('resolve-notes').value;
            
            try {
                const response = await fetch(`/api/admin/error/${currentErrorId}/resolve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({notes})
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to resolve error');
                }
                
                alert('✓ 错误已标记为已解决');
                closeModal('error-detail-modal');
                loadErrors();
            } catch (err) {
                alert('✗ 操作失败: ' + err.message);
            }
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Utility functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderActivityDates(activityDates) {
            const container = document.getElementById('info-activities');
            if (!container) return;
            if (!activityDates || activityDates.length === 0) {
                container.innerHTML = '<div style="color: #6b7280;">暂无活动记录</div>';
                return;
            }

            container.innerHTML = `
                <div style="color: #6b7280; margin-bottom: 10px;">点击日期查看该天的活动详情</div>
                ${activityDates.map(item => `
                    <div class="date-card" onclick="loadDateActivities('${item.date}')">
                        <div class="date-text">${item.date}</div>
                        <div class="date-count">${item.activity_count} 个活动</div>
                    </div>
                `).join('')}
            `;
        }

        async function loadDateActivities(date) {
            if (!currentUserId) {
                alert('无效的用户ID');
                return;
            }

            const container = document.getElementById('info-activities');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`/api/admin/user/${currentUserId}/date/${date}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load activities');
                }

                const activities = data.activities || [];
                
                container.innerHTML = `
                    <button class="btn btn-sm" onclick="showUserInfo('${currentUserId}')" style="margin-bottom: 10px;">
                        ← 返回日期列表
                    </button>
                    <div style="color: #6b7280; margin-bottom: 10px;">
                        ${date} 的活动 (共 ${activities.length} 条)
                    </div>
                    ${activities.length === 0 
                        ? '<div style="color: #6b7280;">该日期暂无活动记录</div>'
                        : activities.map(activity => {
                            const header = `Activity ${activity.activity_index || '-'} • ${formatDate(activity.created_at)}`;
                            const eventsHtml = (activity.events || []).map(evt => {
                                const payload = evt.payload || {};
                                return `
                                    <div class="activity-event">
                                        <div class="activity-meta">${escapeHtml(evt.event_type)} • ${formatDate(evt.created_at)}</div>
                                        <pre>${escapeHtml(JSON.stringify(payload, null, 2))}</pre>
                                    </div>
                                `;
                            }).join('') || '<div class="activity-meta">No events recorded</div>';

                            return `
                                <div class="activity-card">
                                    <div class="activity-meta">${escapeHtml(header)}</div>
                                    ${eventsHtml}
                                </div>
                            `;
                        }).join('')
                    }
                `;
            } catch (err) {
                container.innerHTML = `<div style="color: #ef4444;">加载失败: ${err.message}</div>`;
            }
        }

        async function exportUserData() {
            if (!currentUserId) {
                alert('无效的用户ID');
                return;
            }

            try {
                const response = await fetch(`/api/admin/user/${currentUserId}/export`);
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to export data');
                }

                // Get the blob from response
                const blob = await response.blob();
                
                // Create download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `user_${currentUserId}_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                alert('数据导出成功！');
            } catch (err) {
                alert('导出失败: ' + err.message);
            }
        }

        function renderUserActivities(activities) {
            // Deprecated: kept for backwards compatibility
            // Now use renderActivityDates instead
            renderActivityDates(activities);
        }

        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Initial load
        loadAllData();
    </script>
</body>
</html>
